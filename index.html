<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Speed Test Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shadow"></div>
    <div class="game">
        <div class="name">Typing speed Test Game</div>
        <div class="container">
            <div class="message">
                You Are Playing
                <span class="1v1"></span>Level & You Have <span class="seconds"></span> Seconds To Type The Word
            </div>
            <div class="start">Start Playing</div>
            <div class="words"></div>
            <input type="text" class="input" />
            <div class="coming-words">Words Will Show Here</div>
            <div class="control">
                <div class="time">Time Left: <span></span> Seconds</div>
                <div class="score"> Score: <span class="got">0</span> From <span class="total"></span></div>
            </div>
            <div class="finish"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
